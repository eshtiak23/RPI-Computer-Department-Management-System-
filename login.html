<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login - RPI Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #746471;
    }

    .container-box {
      width: 100%;
      max-width: 1100px;
      height: 90vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    }

    .left {
      background: #f01767;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .left-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .right {
      background: #141a23;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: white;
    }

    .right-inner {
      width: 100%;
      max-width: 350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .circle {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      overflow: hidden;
      animation: float 4s ease-in-out infinite;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
    }

    .circle-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .input-box {
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
    }

    input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      width: 100%;
    }

    .btn {
      width: 100%;
      background: #f01767;
      padding: 14px;
      border-radius: 999px;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
      color: white;
    }

    .mobile-circle {
      display: none;
      justify-content: center;
      margin-bottom: 20px;
    }

    .create-account {
      margin-top: 25px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
    }

    .create-account a {
      color: #f01767;
      font-weight: bold;
      text-decoration: none;
    }

    .create-account a:hover {
      text-decoration: underline;
    }

    .shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body {
        background: #141a23;
      }

      .container-box {
        display: block;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }

      .left {
        display: none;
      }

      .right {
        height: 100vh;
        padding: 24px;
      }

      .right-inner {
        justify-content: center;
        align-items: center;
      }

      .mobile-circle {
        display: flex;
      }

      .mobile-circle .circle {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>

<div class="container-box">

  <!-- LEFT -->
  <div class="left">
    <div class="left-inner">
      <div class="circle">
        <img src="./assets/eshti_login.png" class="circle-img">
      </div>

      <div style="text-align:center;">
        <h1 style="font-size:40px;">Welcome to</h1>
        <p style="font-size:22px;">Your Academic Command Center.</p>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-inner">

      <!-- Mobile Circle -->
      <div class="mobile-circle">
        <div class="circle">
          <img src="./assets/eshti_login.png" class="circle-img">
        </div>
      </div>

      <h2 style="font-size:28px; text-align:center;">Login your Account</h2>

      <form id="loginForm">
        <div id="userBox" class="input-box">
          👤
          <input type="text" id="userId" placeholder="Username">
        </div>

        <div id="passBox" class="input-box">
          🔒
          <input type="password" id="password" placeholder="Password">
        </div>

        <button class="btn">Log In</button>
      </form>

      <!-- CREATE ACCOUNT -->
      <div class="create-account">
        Don’t have an account?  
        <a href="#">Create Account</a>
      </div>

      <p style="margin-top:10px; text-align:center; color:#777;">
        Student login only
      </p>

    </div>
  </div>

</div>

<script>
const form = document.getElementById("loginForm");
const userBox = document.getElementById("userBox");
const passBox = document.getElementById("passBox");
const userId = document.getElementById("userId");
const password = document.getElementById("password");

function shake(el){
  el.classList.remove("shake");
  void el.offsetWidth;
  el.classList.add("shake");
}

form.addEventListener("submit",(e)=>{
  e.preventDefault();

  if(!userId.value.trim()){
    shake(userBox);
    return;
  }

  if(!password.value.trim()){
    shake(passBox);
    return;
  }

  window.location.href="student-dashboard.html";
});
</script>

</body>
</html>
