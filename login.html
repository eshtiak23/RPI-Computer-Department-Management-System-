<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login - RPI Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #746471;
    }

    .container-box {
      width: 100%;
      max-width: 1100px;
      height: 90vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    }

    .left {
      background: #f01767;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .left-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .right {
      background: #141a23;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: white;
    }

    .right-inner {
      width: 100%;
      max-width: 350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .circle {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      overflow: hidden;
      animation: float 4s ease-in-out infinite;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
    }

    .circle-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .input-box {
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
      transition: 0.2s;
    }

    input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      width: 100%;
    }

    input::placeholder {
      color: #94a3b8;
    }

    .btn {
      width: 100%;
      background: #f01767;
      padding: 14px;
      border-radius: 999px;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
      color: white;
      border: none;
      transition: 0.2s;
    }

    .btn:hover {
      opacity: 0.92;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .mobile-circle {
      display: none;
      justify-content: center;
      margin-bottom: 20px;
    }

    .create-account {
      margin-top: 25px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
    }

    .create-account a {
      color: #f01767;
      font-weight: bold;
      text-decoration: none;
    }

    .create-account a:hover {
      text-decoration: underline;
    }

    .shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }

    .status-message {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .status-error {
      color: #fca5a5;
    }

    .status-success {
      color: #86efac;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body {
        background: #141a23;
      }

      .container-box {
        display: block;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }

      .left {
        display: none;
      }

      .right {
        height: 100vh;
        padding: 24px;
      }

      .right-inner {
        justify-content: center;
        align-items: center;
      }

      .mobile-circle {
        display: flex;
      }

      .mobile-circle .circle {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>

<div class="container-box">

  <!-- LEFT -->
  <div class="left">
    <div class="left-inner">
      <div class="circle">
        <img src="./assets/eshti_login.png" class="circle-img" alt="Student">
      </div>

      <div style="text-align:center;">
        <h1 style="font-size:40px;">Welcome to</h1>
        <p style="font-size:22px;">Your Academic Command Center.</p>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-inner">

      <!-- Mobile Circle -->
      <div class="mobile-circle">
        <div class="circle">
          <img src="./assets/eshti_login.png" class="circle-img" alt="Student">
        </div>
      </div>

      <h2 style="font-size:28px; text-align:center;">Login your Account</h2>

      <form id="loginForm">
        <div id="userBox" class="input-box">
          <span>📧</span>
          <input type="email" id="email" placeholder="Email">
        </div>

        <div id="passBox" class="input-box">
          <span>🔒</span>
          <input type="password" id="password" placeholder="Password">
        </div>

        <button id="loginBtn" class="btn" type="submit">Log In</button>

        <div id="statusMessage" class="status-message"></div>
      </form>

      <!-- CREATE ACCOUNT -->
      <div class="create-account">
        Don’t have an account?
        <a href="./create_acount.html" target="_blank">Create Account</a>
      </div>

      <p style="margin-top:10px; text-align:center; color:#777;">
        Student login only
      </p>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://cdeulhheleboruiffbtg.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkZXVsaGhlbGVib3J1aWZmYnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzc3MTcsImV4cCI6MjA5MTk1MzcxN30.5_dNfxHPSKP86kYXQLmTmcjQu_YQT2zu9ScLJ_Lwn5E";

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const form = document.getElementById("loginForm");
  const userBox = document.getElementById("userBox");
  const passBox = document.getElementById("passBox");
  const loginInput = document.getElementById("email"); // email OR username input
  const password = document.getElementById("password");
  const loginBtn = document.getElementById("loginBtn");
  const statusMessage = document.getElementById("statusMessage");

  function shake(el) {
    el.classList.remove("shake");
    void el.offsetWidth;
    el.classList.add("shake");
  }

  function showStatus(message, type = "") {
    statusMessage.textContent = message;
    statusMessage.className = "status-message";

    if (type === "error") {
      statusMessage.classList.add("status-error");
    }

    if (type === "success") {
      statusMessage.classList.add("status-success");
    }
  }

  function resetButton() {
    loginBtn.disabled = false;
    loginBtn.textContent = "Log In";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    userBox.style.borderColor = "rgba(255,255,255,0.2)";
    passBox.style.borderColor = "rgba(255,255,255,0.2)";
    showStatus("");

    const inputValue = loginInput.value.trim();
    const userPassword = password.value.trim();

    if (!inputValue) {
      userBox.style.borderColor = "#f87171";
      shake(userBox);
      showStatus("Please enter your email or username.", "error");
      return;
    }

    if (!userPassword) {
      passBox.style.borderColor = "#f87171";
      shake(passBox);
      showStatus("Please enter your password.", "error");
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";

    try {
      let loginEmail = inputValue;

      // If input is username, find matching email from students table

      if (!inputValue.includes("@")) {
        const { data: studentData, error: usernameError } = await supabaseClient
          .from("students")
          .select('"Email"')
          .eq("username", inputValue)
          .maybeSingle();

        if (usernameError) {
          throw usernameError;
        }

        if (!studentData) {
          throw new Error("Username not found.");
        }

        loginEmail = studentData["Email"];
      }

      const { error: loginError } = await supabaseClient.auth.signInWithPassword({
        email: loginEmail,
        password: userPassword
      });

      if (loginError) {
        throw loginError;
      }

      showStatus("Login successful. Redirecting...", "success");

      setTimeout(() => {
        window.location.href = "student-dashboard.html";
      }, 900);

    } catch (error) {
      console.error("Login Error:", error);
      passBox.style.borderColor = "#f87171";
      shake(passBox);
      showStatus(error.message || "Login failed.", "error");
      resetButton();
    }
  });
</script>

</body>
</html>
